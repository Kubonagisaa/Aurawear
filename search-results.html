<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Kết quả tìm kiếm - Aura Wear</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        /* ================= KHU VỰC 1: BIẾN SỐ & RESET TOÀN CỤC PHÒNG THỦ ================= */
        :root { 
            --bg-color: #fcfbf9; 
            --text-color: #1A1A1A; 
            --footer-bg: #1e2c24; 
            --btn-color: #dcb38a; 
            --gray-text: #666; 
            --border-color: #eeeeee;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        }
        
        html {
            width: 100%;
            max-width: 100%;
            -webkit-text-size-adjust: 100%; 
            -ms-text-size-adjust: 100%;
            font-size: 16px;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.5;
            width: 100%;
            max-width: 100%;
            padding-top: 65px; 
        }
        
        a { text-decoration: none; color: inherit; }
        img { width: 100%; height: 100%; display: block; object-fit: cover; }
        ul { list-style: none; }

        /* ================= KHU VỰC 2: HIỆU ỨNG VÀO TRANG CỦA HỆ THỐNG ================= */
        .animate-up {
            opacity: 0; 
            transform: translateY(20px); 
            animation: slideUpFade 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            will-change: transform, opacity;
        }

        @keyframes slideUpFade { 
            0% { opacity: 0; transform: translateY(20px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }

        .delay-1 { animation-delay: 0.4s; } 

        .jump-char {
            display: inline-block;
            opacity: 0;
            transform: translateY(40px);
            will-change: transform, opacity;
        }
        
        .start-anim .jump-char {
            animation: textBounceJump 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes textBounceJump {
            0% { opacity: 0; transform: translateY(40px); }
            60% { opacity: 1; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ================= KHU VỰC 3: GIAO DIỆN THANH ĐIỀU HƯỚNG FIXED TOÀN DIỆN ================= */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 16px; 
            background: #ffffff; 
            position: fixed; 
            top: 0; 
            left: 0;
            z-index: 100; 
            border-bottom: 1px solid var(--border-color); 
            width: 100%;
            height: 65px;
            overflow: visible; 
            transition: width 0.85s cubic-bezier(0.25, 1, 0.5, 1), 
                        height 0.85s cubic-bezier(0.25, 1, 0.5, 1), 
                        border-radius 0.85s cubic-bezier(0.25, 1, 0.5, 1), 
                        top 0.85s cubic-bezier(0.25, 1, 0.5, 1), 
                        left 0.85s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.85s cubic-bezier(0.25, 1, 0.5, 1),
                        background-color 0.5s ease,
                        box-shadow 0.5s ease;
            will-change: width, height, border-radius, top, left, transform, background-color;
        }
        
        .logo .jump-char { 
            display: inline-block;
            overflow: hidden;
            max-width: 35px;
            white-space: nowrap;
            transform: translateY(0);
            opacity: 1;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        opacity 0.6s ease, 
                        max-width 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        margin 0.8s ease;
            will-change: transform, opacity, max-width, margin;
        }
        
        header.search-mode .logo .jump-char {
            animation: none !important;
        }

        .logo { 
            font-size: 20px; 
            font-weight: 900; 
            letter-spacing: 1.5px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            white-space: nowrap;
            transition: opacity 0.3s ease;
            margin-right: 24px; 
        }
        
        .nav-links { 
            display: none; 
            transition: opacity 0.85s cubic-bezier(0.25, 1, 0.5, 1);
        } 
        
        .nav-links a, .nav-links span {
            display: inline-block;
            white-space: nowrap;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, opacity;
            margin-right: 16px; 
        }
        
        header.search-mode .nav-links a {
            opacity: 0 !important;
            transform: translateX(45px) !important;
        }

        .header-right-wrapper {
            display: flex;
            align-items: center;
            flex: 1;
            justify-content: flex-end;
            gap: 16px;
            height: 100%;
            position: relative; 
            transition: all 0.85s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .header-right-wrapper input {
            flex: 0;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            height: 38px;
            padding: 0;
            border: 0px solid transparent;
            border-radius: 4px;
            outline: none;
            font-size: 14px;
            background: #ffffff;
            color: var(--text-color);
            font-weight: 500;
            transition: flex 0.85s cubic-bezier(0.19, 1, 0.22, 1), 
                        max-width 0.85s cubic-bezier(0.19, 1, 0.22, 1), 
                        opacity 0.6s ease, 
                        padding 0.85s ease,
                        margin 0.85s ease;
        }
        header.search-mode .header-right-wrapper input {
            flex: 1;
            max-width: 1000px;
            opacity: 1;
            padding: 0 12px;
            border: 1.5px solid var(--text-color);
            margin-left: 12px;
        }

        .search-suggestions-box {
            position: absolute;
            top: 52px;
            left: 12px;
            width: calc(100% - 110px);
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-height: 280px;
            overflow-y: auto;
            z-index: 10010;
            display: none;
        }
        .search-suggestions-box.active { display: block; }
        
        .suggestion-item {
            padding: 12px 16px; font-size: 14px; font-weight: 500; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #f9f9f9; color: var(--text-color); transition: background 0.2s ease;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #fcf8f4; color: var(--btn-color); }
        .suggestion-tag { font-size: 11px; background: #f0f0f0; color: #666; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }

        .main-search-icon {
            width: 22px; height: 22px; cursor: pointer; color: var(--text-color); flex-shrink: 0;
            transition: transform 0.85s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform;
        }
        .main-search-icon:hover { opacity: 0.7; }

        .search-close-btn {
            cursor: pointer; font-size: 17px; font-weight: normal; color: var(--text-color); text-transform: lowercase; 
            white-space: nowrap; flex-shrink: 0; max-width: 0; opacity: 0; overflow: hidden;
            transition: max-width 0.85s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease, padding 0.85s ease;
        }
        header.search-mode .search-close-btn { max-width: 100px; opacity: 1; padding: 0 4px; }
        
        .menu-toggle { 
            display: block; width: 24px; height: 18px; position: relative; cursor: pointer; max-width: 24px;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), max-width 0.6s ease;
        }
        header.search-mode .menu-toggle { opacity: 0; max-width: 0; transform: translateX(25px); pointer-events: none; overflow: hidden; margin: 0; }
        
        .menu-toggle span {
            display: block; position: absolute; height: 2px; width: 100%; background: var(--text-color); border-radius: 2px; opacity: 1; left: 0; transform: rotate(0deg);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.2s ease;
        }
        
        .menu-toggle span:nth-child(1) { top: 0px; }
        .menu-toggle span:nth-child(2) { top: 8px; }
        .menu-toggle span:nth-child(3) { top: 16px; }
        
        .menu-toggle.open span:nth-child(1) { top: 8px; transform: rotate(135deg); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .menu-toggle.open span:nth-child(3) { top: 8px; transform: rotate(-135deg); }

        .circle-logo-a {
            display: none; position: absolute; font-size: 26px; font-weight: 900; color: #dcb38a; letter-spacing: 0; text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
        }

        /* ================= KHU VỰC 4: MENU THẢ XUỐNG DI ĐỘNG ================= */
        .mobile-menu-dropdown {
            display: block; position: absolute; top: 65px; left: 0; width: 100%; background: #ffffff; border-bottom: 1px solid var(--border-color); z-index: 99; padding: 0 20px; max-height: 0; opacity: 0; overflow: hidden; visibility: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease, padding 0.4s ease, visibility 0.4s; will-change: max-height, opacity;
        }
        
        .mobile-menu-dropdown.open { max-height: 380px; opacity: 1; padding: 20px; visibility: visible; }

        .mobile-menu-dropdown ul li.main-item a { display: block; padding: 14px 0; font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .mobile-menu-dropdown ul li.auth-row { display: flex; justify-content: space-between; gap: 10px; padding-top: 15px; }
        
        .mobile-menu-dropdown ul li.auth-row a {
            flex: 1; padding: 12px 0; font-size: 13px; font-weight: bold; text-transform: uppercase; text-align: center; border-radius: 4px; background: #f5f5f5; color: var(--text-color); border: none; cursor: pointer;
        }

        .mobile-menu-dropdown ul li.auth-row a.btn-dark {
            background: var(--text-color); color: #fff;
        }

        /* ================= KHU VỰC 5: BỐ CỤC HIỂN THỊ SẢN PHẨM KHỚP TÌM KIẾM ================= */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 16px; min-height: 65vh; }
        .search-status-title { font-size: 16px; font-weight: 600; margin: 32px 0 20px; letter-spacing: 1px; text-transform: uppercase; }
        .search-status-title strong { font-weight: 700; color: var(--btn-color); }
        
        .grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; }
        
        .product-card { text-align: left; position: relative; width: 100%; margin-bottom: 16px; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); border: 2px solid transparent; }
        .product-img { height: 260px; background: #eaeaea; margin-bottom: 12px; position: relative; overflow: hidden; border-radius: 4px; }
        
        /* HIỆU ỨNG NHẢY LÊN NHẸ VÀ ĐỔ BÓNG CHO DI ĐỘNG & PC KHI HOVER/ACTIVE */
        .product-card:hover, .product-card:active { transform: translateY(-6px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        
        .product-info { display: flex; justify-content: space-between; align-items: flex-start; padding: 4px 0; }
        .product-name { font-size: 12px; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; line-height: 1.3; }
        .product-price { font-size: 12px; font-weight: bold; color: var(--text-color); }
        .product-actions svg { width: 18px; height: 18px; margin-left: 4px; cursor: pointer; }

        /* HIỆU ỨNG ANIMATION CHO TIM VÀ GIỎ HÀNG KHI ẤN ĐƯỢC ĐỒNG BỘ */
        .aura-bounce-jump {
            animation: auraIconJump 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
        }
        @keyframes auraIconJump {
            0% { transform: scale(1); }
            30% { transform: scale(1.4) translateY(-6px); }
            50% { transform: scale(0.9) translateY(2px); }
            75% { transform: scale(1.1) translateY(-1px); }
            100% { transform: scale(1) translateY(0); }
        }

        .no-results { text-align: center; padding: 80px 16px; grid-column: span 2; }
        .no-results h3 { font-size: 15px; margin-bottom: 24px; color: #555; font-weight: 500; }
        .no-results .btn-back { padding: 16px 40px; background: var(--text-color); color: #fff; font-size: 14px; font-weight: bold; border: none; cursor: pointer; letter-spacing: 1.5px; text-transform: uppercase; min-height: 48px; }

        /* ================= KHU VỰC 6: CHÂN TRANG HỆ THỐNG (FOOTER) ================= */
        footer { background: var(--footer-bg); color: #fff; padding: 48px 16px 24px; font-size: 13px; width: 100%; margin-top: 60px; }
        .copyright { text-align: center; color: #888; font-size: 11px; border-top: 1px solid #334; padding-top: 24px; text-transform: uppercase; letter-spacing: 1px; }

        /* ================= RESPONSIVE LAYOUT MEDIA QUERY ================= */
        @media (max-width: 767px) {
            header.header-circle {
                width: 65px !important; height: 65px !important; border-radius: 50% !important; top: 16px !important; left: 50% !important; transform: translateX(-50%) !important; padding: 0 !important; justify-content: center !important; box-shadow: 0 10px 30px rgba(0,0,0,0.25) !important; border: 1px solid rgba(255,255,255,0.1) !important; background-color: #FFF8F8 !important; 
            }
            
            header.header-circle .logo, 
            header.header-circle .nav-links,
            header.header-circle .header-right-wrapper { opacity: 0 !important; pointer-events: none !important; }
            header.header-circle .circle-logo-a { display: block !important; opacity: 1 !important; }

            header.header-circle.header-expanded {
                width: calc(100% - 32px) !important; height: 65px !important; border-radius: 32px !important; left: 16px !important; transform: translateX(0) !important; padding: 20px 24px !important; justify-content: space-between !important; background-color: #ffffff !important; box-shadow: 0 12px 35px rgba(0,0,0,0.15) !important;
            }
            
            header.header-circle.header-expanded .logo,
            header.header-circle.header-expanded .header-right-wrapper { opacity: 1 !important; pointer-events: auto !important; }
            header.header-circle.header-expanded .circle-logo-a { opacity: 0 !important; display: none !important; }

            header.search-mode {
                width: 100% !important; height: 65px !important; border-radius: 0 !important; top: 0 !important; left: 0 !important; transform: none !important; padding: 0 16px !important; background-color: #ffffff !important; box-shadow: 0 4px 15px rgba(0,0,0,0.06) !important;
            }
            header.search-mode .circle-logo-a { display: none !important; }
            header.search-mode .logo { opacity: 1 !important; pointer-events: auto !important; }
            header.search-mode .header-right-wrapper { opacity: 1 !important; pointer-events: auto !important; }
            
            .search-suggestions-box { width: calc(100% - 70px); left: 12px; top: 52px; }

            .mobile-menu-dropdown { position: fixed !important; top: 70px; left: 16px; width: calc(100% - 32px); border-radius: 24px; box-shadow: 0 16px 40px rgba(0,0,0,0.12); border: 1px solid var(--border-color); }
            header.header-circle.header-expanded ~ .mobile-menu-dropdown { top: 92px !important; }

            /* CHỈ THU GỌN LOGO THÀNH "A" TRÊN DI ĐỘNG KHI SEARCH MODE BẬT */
            header.search-mode .logo .jump-char:not(:first-child) {
                opacity: 0;
                transform: translateY(50px); 
                max-width: 0px;
                margin: 0;
                pointer-events: none;
                transition: transform 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045), 
                            opacity 0.4s ease, 
                            max-width: 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                            margin 0.6s ease;
            }
        }

        @media (min-width: 768px) {
            header { padding: 15px 40px; height: 70px; left: 0 !important; transform: none !important; }
            .logo { font-size: 22px; }
            .nav-links { display: flex; gap: 32px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; } 
            .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 24px; } 
            .product-img { height: 360px; }
            .product-name { font-size: 14px; }
            .product-price { font-size: 14px; }
            .product-img img { transition: transform 0.4s ease; }
            .product-img:hover img { transform: scale(1.04); }
            .search-suggestions-box { width: calc(100% - 130px); top: 55px; }
            .search-status-title { font-size: 20px; margin: 48px 0 24px; }

            /* ÉP GIỮ NGUYÊN HOÀN TOÀN CHỮ AURA WEAR TRÊN PC KHI SEARCH */
            header.search-mode .logo .jump-char {
                opacity: 1 !important;
                transform: translateY(0) !important;
                max-width: 35px !important;
                margin: inherit !important;
            }
            header.search-mode .nav-links {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <header class="animate-up delay-1 header-circle" id="main-header">
        <div class="circle-logo-a">A</div>

        <div class="logo" onclick="goToHome()">
            <span class="jump-char" style="animation-delay: 0.05s;">A</span>
            <span class="jump-char" style="animation-delay: 0.09s;">U</span>
            <span class="jump-char" style="animation-delay: 0.13s;">R</span>
            <span class="jump-char" style="animation-delay: 0.17s;">A</span>
            <span class="jump-char" style="animation-delay: 0.21s;">&nbsp;</span>
            <span class="jump-char" style="animation-delay: 0.25s;">W</span>
            <span class="jump-char" style="animation-delay: 0.29s;">E</span>
            <span class="jump-char" style="animation-delay: 0.33s;">A</span>
            <span class="jump-char" style="animation-delay: 0.37s;">R</span>
        </div>
        
        <nav class="nav-links" id="pc-nav-area"></nav>

        <div class="header-right-wrapper">
            <input type="text" id="global-search-input" placeholder="Tìm quần áo, phong cách..." onkeydown="if(event.key === 'Enter') handleExecuteSearch()" oninput="handleSearchInput(this.value)">
            <div id="search-suggestions" class="search-suggestions-box"></div>

            <svg class="main-search-icon" id="main-search-icon" onclick="handleSearchIconClick()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span class="search-close-btn" id="search-close-btn" onclick="toggleSearchBar(false)">hủy</span>
            <div class="menu-toggle" id="menu-toggle-btn">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <div class="mobile-menu-dropdown" id="mobile-menu">
        <ul id="mobile-nav-area"></ul>
    </div>

    <main class="container">
        <h2 class="search-status-title" id="status-title">Đang quét dữ liệu sản phẩm...</h2>
        <div class="grid-4" id="results-grid"></div>
        <div class="no-results" id="empty-box" style="display: none;">
            <h3>Rất tiếc, Aura Wear không tìm thấy sản phẩm nào phù hợp.</h3>
            <button class="btn-back" onclick="goToHome()">Tiếp tục mua sắm</button>
        </div>
    </main>

    <footer>
        <div class="copyright">© 2024 AURA WEAR. ALL RIGHTS RESERVED.</div>
    </footer>

    <script>
        // Cấu hình kết nối đồng bộ cơ sở dữ liệu Firebase Firestore
        const firebaseConfig = {
            apiKey: "AIzaSyBGinRMz19O-W_Eij9ysWp-F-RZLHENSP8",
            authDomain: "aura-wear-2e12b.firebaseapp.com",
            projectId: "aura-wear-2e12b",
            storageBucket: "aura-wear-2e12b.firebasestorage.app",
            messagingSenderId: "912198846142",
            appId: "1:912198846142:web:2a0363a53ef620d35940ef"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const ADMIN_EMAIL = "admin@aura.com"; 
        const currentUser = JSON.parse(localStorage.getItem('aura_current_user'));

        // Biến toàn cục lưu cache phục vụ bộ gợi ý tìm kiếm tức thì
        let ALL_PRODUCTS_CACHE = [];
        let ALL_CATEGORIES_CACHE = [];

        window.addEventListener('DOMContentLoaded', async () => {
            setupNavigation();
            await initSearchCache(); // Khởi nạp bộ nhớ cache đồng bộ đám mây
            renderSearchResults();
            
            setTimeout(() => {
                const header = document.querySelector('header');
                if (window.scrollY <= 80) {
                    header.classList.remove('header-circle'); 
                }
                header.classList.add('start-anim');
            }, 200);
        });

        // Hàm tải nhanh toàn bộ danh sách sản phẩm và style về bộ nhớ tạm để giảm tải Request mạng
        async function initSearchCache() {
            try {
                const prodSnap = await db.collection('products').get();
                prodSnap.forEach(doc => { ALL_PRODUCTS_CACHE.push(doc.data()); });
                const catSnap = await db.collection('categories').get();
                catSnap.forEach(doc => { ALL_CATEGORIES_CACHE.push(doc.data()); });
            } catch (e) {
                console.error("Lỗi khởi tạo cache tìm kiếm:", e);
            }
        }

        // LÓGIC TÌM KIẾM ĐỘNG: Quét đồng bộ dữ liệu đám mây kiểm tra khớp Tên sản phẩm hoặc nhóm Phân loại
        async function renderSearchResults() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') ? urlParams.get('q').trim() : "";

            const statusTitle = document.getElementById('status-title');
            const resultsGrid = document.getElementById('results-grid');
            const emptyBox = document.getElementById('empty-box');

            if (!query) {
                statusTitle.innerHTML = "Bạn chưa nhập từ khóa tìm kiếm.";
                resultsGrid.innerHTML = "";
                emptyBox.style.display = "block";
                return;
            }

            statusTitle.innerHTML = `Kết quả tìm kiếm cho: "<strong>${escapeHtml(query)}</strong>"`;
            const lowerQuery = query.toLowerCase();

            try {
                const snapshot = await db.collection('products').orderBy('createdAt', 'desc').get();
                let htmlContent = '';
                let hasResults = false;

                snapshot.forEach(doc => {
                    const prod = doc.data();
                    const name = prod.name || "";
                    const category = prod.category || "";
                    const price = parseInt(prod.price) || 0;
                    const priceText = price.toLocaleString('vi-VN') + " VND";
                    const img = (prod.variants && prod.variants.length > 0) ? prod.variants[0].img : '';

                    // Kiểm tra xem từ khóa gõ vào có chứa trong Tên hoặc trùng khớp Phân loại (Knitwear, Denim...) không
                    if (name.toLowerCase().includes(lowerQuery) || category.toLowerCase().includes(lowerQuery)) {
                        hasResults = true;
                        htmlContent += `
                            <div class="product-card">
                                <div class="product-img">
                                    <img src="${img}" alt="${escapeHtml(name)}" style="cursor: pointer;" onclick="window.location.href='./product-detail.html?name=${encodeURIComponent(name)}&price=${price}'">
                                </div>
                                <div class="product-info">
                                    <div>
                                        <div class="product-name">${name}</div>
                                        <div class="product-price">${priceText}</div>
                                    </div>
                                    <div class="product-actions">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });

                if (hasResults) {
                    resultsGrid.innerHTML = htmlContent;
                    emptyBox.style.display = "none";
                    setTimeout(checkInitialCart, 200); // Tự động đồng bộ trạng thái màu vàng của xe đẩy sau khi render kết quả
                } else {
                    resultsGrid.innerHTML = "";
                    emptyBox.style.display = "block";
                }

            } catch (error) {
                console.error("Lỗi truy vấn Firestore:", error);
                statusTitle.innerHTML = "Không thể đồng bộ kết quả tìm kiếm vào lúc này.";
            }
        }

        function handleSearchIconClick() {
            const header = document.getElementById('main-header');
            if (header.classList.contains('search-mode')) {
                handleExecuteSearch(); 
            } else {
                toggleSearchBar(true); 
            }
        }

        function toggleSearchBar(show) {
            const header = document.getElementById('main-header');
            const input = document.getElementById('global-search-input');
            const suggestionsBox = document.getElementById('search-suggestions');
            if (show) {
                header.classList.add('search-mode');
                setTimeout(() => { input.focus(); }, 200);
            } else {
                header.classList.remove('search-mode');
                input.value = '';
                suggestionsBox.classList.remove('active');
            }
        }

        function handleSearchInput(value) {
            const query = value.trim().toLowerCase();
            const suggestionsBox = document.getElementById('search-suggestions');
            
            if (!query) {
                suggestionsBox.innerHTML = '';
                suggestionsBox.classList.remove('active');
                return;
            }

            const availableItems = [];
            ALL_PRODUCTS_CACHE.forEach(p => availableItems.push({ name: p.name, type: 'Sản phẩm' }));
            ALL_CATEGORIES_CACHE.forEach(c => availableItems.push({ name: c.name, type: 'Phong cách' }));

            // Cơ chế dự phòng cứu nguy nếu mạng tải chậm chưa kịp nạp xong Cache
            if (availableItems.length === 0) {
                const fallbackStyles = ['Knitwear', 'Denim', 'Coats & Jackets', 'Accessories'];
                fallbackStyles.forEach(s => availableItems.push({ name: s, type: 'Phong cách' }));
            }

            const matchedItems = availableItems.filter(item => item.name.toLowerCase().includes(query));

            if (matchedItems.length > 0) {
                suggestionsBox.innerHTML = matchedItems.map(item => `
                    <div class="suggestion-item" onclick="handleSelectSuggestion('${item.name}')">
                        <span>${item.name}</span>
                        <span class="suggestion-tag">${item.type}</span>
                    </div>
                `).join('');
                suggestionsBox.classList.add('active');
            } else {
                suggestionsBox.innerHTML = `<div class="suggestion-item" style="color: #999; cursor: default;">Không tìm thấy gợi ý liên quan</div>`;
                suggestionsBox.classList.add('active');
            }
        }

        function handleSelectSuggestion(name) {
            document.getElementById('global-search-input').value = name;
            document.getElementById('search-suggestions').classList.remove('active');
            handleExecuteSearch();
        }

        function handleExecuteSearch() {
            const input = document.getElementById('global-search-input');
            const query = input.value.trim();
            if (!query) return;

            document.getElementById('search-suggestions').classList.remove('active');
            
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?q=${encodeURIComponent(query)}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            
            renderSearchResults();
            toggleSearchBar(false);
        }

        function goToHome() { window.location.href = './index.html'; }
        function goToProfile() { localStorage.setItem('open_profile_after_load', 'true'); window.location.href = './index.html'; }
        function handleLogout() { localStorage.removeItem('aura_current_user'); window.location.href = './index.html'; }

        function setupNavigation() {
            const pcNav = document.getElementById('pc-nav-area');
            const mobNav = document.getElementById('mobile-nav-area');
            const iconProfile = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:8px;display:inline-block;vertical-align:middle;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
            const iconCart = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:8px;display:inline-block;vertical-align:middle;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`;
            const iconHeart = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:8px;display:inline-block;vertical-align:middle;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

            if (currentUser) {
                let adminLinkPC = ''; let adminLinkMob = '';
                if (currentUser.email === "admin@gmail.com" || currentUser.email === ADMIN_EMAIL) {
                    adminLinkPC = `<a href="./update.html" style="color: #d9534f; font-weight: bold;">[Admin]</a>`;
                    adminLinkMob = `<li class="main-item"><a href="./update.html" style="color: #d9534f;">Cập Nhật Đồ (Admin)</a></li>`;
                }
                
                pcNav.innerHTML = `<span style="margin-right:16px;"><a onclick="goToHome()">Home</a></span><span style="margin-right:16px;"><a href="./heart-press.html">Yêu Thích</a></span><span style="margin-right:16px;"><a href="./my-shopping-cart.html">Giỏ Hàng</a></span>${adminLinkPC}<span style="margin-right:16px;"><a onclick="goToProfile()" style="color: #dcb38a; font-weight: bold; cursor: pointer;">Hi, ${currentUser.name.split(' ')[0]}</a></span><span><a onclick="handleLogout()" style="color: #d9534f; cursor: pointer;">Thoát</a></span>`;
                
                mobNav.innerHTML = `
                    <li class="main-item"><a onclick="goToHome()">Trang Chủ</a></li>
                    <li class="main-item"><a onclick="goToProfile()">${iconProfile}Hồ Sơ Của Tôi</a></li>
                    <li class="main-item"><a href="./my-shopping-cart.html">${iconCart}Giỏ Hàng Của Tôi</a></li>
                    <li class="main-item"><a href="./heart-press.html">${iconHeart}Mục Yêu Thích</a></li>
                    ${adminLinkMob}
                    <li class="auth-row"><a onclick="handleLogout()" style="width: 100%; color: #fff; background: #d9534f; cursor: pointer;">ĐĂNG XUẤT</a></li>
                `;
            } else {
                pcNav.innerHTML = `<span style="margin-right:16px;"><a onclick="goToHome()">Home</a></span><span style="margin-right:16px;"><a href="./heart-press.html">Yêu Thích</a></span><span style="margin-right:16px;"><a href="./my-shopping-cart.html">Giỏ Hàng</a></span><span style="margin-right:16px;"><a href="./login.html">Login</a></span><span><a href="./register.html">Register</a></span>`;
                
                mobNav.innerHTML = `
                    <li class="main-item"><a onclick="goToHome()">Trang Chủ</a></li>
                    <li class="main-item"><a href="./login.html">${iconProfile}Tài Khoản</a></li>
                    <li class="main-item"><a href="./my-shopping-cart.html">${iconCart}Giỏ Hàng Của Tôi</a></li>
                    <li class="main-item"><a href="./heart-press.html">${iconHeart}Mục Yêu Thích</a></li>
                    <li class="auth-row"><a href="./login.html">Đăng Nhập</a><a href="./register.html" class="btn-dark">Đăng Ký</a></li>
                `;
            }
        }

        window.addEventListener('scroll', () => {
            if (window.innerWidth < 768) {
                const header = document.querySelector('header');
                if (header.classList.contains('search-mode')) return;

                if (window.scrollY > 80) {
                    if (!header.classList.contains('header-circle')) {
                        header.classList.add('header-circle');
                        header.classList.remove('header-expanded');
                        document.getElementById('mobile-menu').classList.remove('open');
                        document.getElementById('menu-toggle-btn').classList.remove('open');
                    }
                } else {
                    header.classList.remove('header-circle');
                    header.classList.remove('header-expanded');
                }
            }
        });

        document.querySelector('header').addEventListener('click', (e) => {
            if (window.innerWidth < 768) {
                const header = document.querySelector('header');
                if (header.classList.contains('search-mode')) return;
                if (header.classList.contains('header-circle') && !header.classList.contains('header-expanded')) {
                    e.preventDefault();
                    e.stopPropagation();
                    header.classList.add('header-expanded');
                }
            }
        });

        document.getElementById('menu-toggle-btn').addEventListener('click', (e) => {
            if (window.innerWidth < 768) {
                const header = document.querySelector('header');
                if (header.classList.contains('header-circle') && !header.classList.contains('header-expanded')) {
                    return; 
                }
            }
            e.stopPropagation();
            const btn = document.getElementById('menu-toggle-btn');
            const menu = document.getElementById('mobile-menu');
            btn.classList.toggle('open');
            menu.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            const wrapper = document.querySelector('.header-right-wrapper');
            const suggestionsBox = document.getElementById('search-suggestions');
            if (wrapper && !wrapper.contains(e.target) && suggestionsBox) {
                suggestionsBox.classList.remove('active');
            }
        });

        // ================= ĐỒNG BỘ LOGIC THAO TÁC GIỎ HÀNG VỚI FIREBASE (GIỮ NGUYÊN NÚT NHẤN TỪ TRANG CHỦ) =================
        document.getElementById('results-grid').addEventListener('click', (e) => {
            const actionBtn = e.target.closest('.product-actions');
            if (actionBtn) {
                e.preventDefault();
                e.stopPropagation();
                
                const card = actionBtn.closest('.product-card');
                const name = card.querySelector('.product-name').innerText.trim();
                const priceText = card.querySelector('.product-price').innerText;
                const price = parseInt(priceText.replace(/[^0-9]/g, ''));
                const img = card.querySelector('.product-img img').src;
                
                handleAddToCart(name, price, img, actionBtn);
            }
        });

        async function handleAddToCart(name, price, img, element) {
            if (!currentUser) {
                alert("Vui lòng đăng nhập để thao tác thêm giỏ hàng!");
                return;
            }

            if (element) {
                element.classList.add('aura-bounce-jump');
                element.addEventListener('animationend', () => {
                    element.classList.remove('aura-bounce-jump');
                }, { once: true });
            }

            try {
                const cartRef = db.collection('carts');
                const snapshot = await cartRef
                    .where('userEmail', '==', currentUser.email)
                    .where('name', '==', name)
                    .get();

                if (!snapshot.empty) {
                    const docId = snapshot.docs[0].id;
                    await cartRef.doc(docId).delete();
                    
                    if (element) {
                        const svg = element.querySelector('svg');
                        if (svg) {
                            svg.style.stroke = 'currentColor';
                            svg.style.fill = 'none';
                        }
                    }
                } else {
                    await cartRef.add({
                        userEmail: currentUser.email,
                        name: name,
                        price: price,
                        img: img,
                        quantity: 1,
                        createdAt: new Date()
                    });
                    
                    if (element) {
                        const svg = element.querySelector('svg');
                        if (svg) {
                            svg.style.stroke = '#dcb38a';
                            svg.style.fill = '#dcb38a';
                        }
                    }
                }
            } catch (error) {
                console.error("Lỗi cập nhật giỏ hàng Firestore:", error);
            }
        }

        async function checkInitialCart() {
            if (!currentUser) return;
            try {
                const snapshot = await db.collection('carts').where('userEmail', '==', currentUser.email).get();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    document.querySelectorAll('.product-card').forEach(card => {
                        const name = card.querySelector('.product-name').innerText;
                        if (name.trim().toLowerCase() === data.name.trim().toLowerCase()) {
                            const svg = card.querySelector('.product-actions svg');
                            if (svg) {
                                svg.style.stroke = '#dcb38a';
                                svg.style.fill = '#dcb38a';
                            }
                        }
                    });
                });
            } catch (error) {
                console.error("Lỗi đồng bộ giỏ hàng:", error);
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
